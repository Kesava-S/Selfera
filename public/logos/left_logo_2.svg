<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Receipt Paper with jagged bottom -->
  <path d="M 22 15 h 48 v 60 l -8 -5 l -8 5 l -8 -5 l -8 5 l -8 -5 l -8 5 z" fill="#1a5653" />
  
  <!-- Lines -->
  <rect x="32" y="25" width="28" height="4" rx="2" fill="white" />
  <rect x="32" y="34" width="22" height="4" rx="2" fill="#84b8b2" />
  <rect x="32" y="43" width="26" height="4" rx="2" fill="#84b8b2" />
  <rect x="32" y="52" width="18" height="4" rx="2" fill="#84b8b2" />

  <!-- Coin Stack -->
  <!-- Bottom Coin -->
  <ellipse cx="68" cy="74" rx="18" ry="10" fill="#d28b26" />
  <!-- Top Coin body -->
  <circle cx="68" cy="62" r="17" fill="#e99f38" />
  <circle cx="68" cy="62" r="14" fill="#e99f38" stroke="#d28b26" strokeWidth="2" />
  
